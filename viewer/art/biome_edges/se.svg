<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet" color="#000000">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
    <!-- Inward fade for SE edge. Midpoint (96,129.5); inward normal (-0.5, -0.866). -->
    <linearGradient id="lg-feather" gradientUnits="userSpaceOnUse"
                    x1="96" y1="129.5" x2="84" y2="108.7">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="currentColor" stop-opacity="0.3"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#hex)">
    <polygon points="64,148 128,111 116,90 52,127" fill="url(#lg-feather)"/>
  </g>
</svg>
