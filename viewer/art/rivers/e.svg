<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
  </defs>
  <g clip-path="url(#hex)">
    <!-- Solid water channel from past-center (60,74) to past-edge (132,74),
         16 px wide. All 6 directional segments share fill #4a86a8 so any
         combination meets seamlessly at center and at hex boundaries. -->
    <polygon points="60,66 132,66 132,82 60,82" fill="#4a86a8"/>
  </g>
</svg>
