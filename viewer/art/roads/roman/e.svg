<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
  </defs>
  <g clip-path="url(#hex)">
    <!-- Stone strip from past-center x=56 to past-edge x=140 (12 px past hex
         boundary so anti-aliasing never truncates the visible edge). -->
    <rect x="56" y="68" width="84" height="12" fill="#a89868"/>
    <line x1="56" y1="67" x2="140" y2="67" stroke="#3a342a" stroke-width="0.7"/>
    <line x1="56" y1="81" x2="140" y2="81" stroke="#3a342a" stroke-width="0.7"/>
    <line x1="56" y1="74" x2="140" y2="74" stroke="#5a4e36" stroke-width="0.4" opacity="0.55"/>
    <g stroke="#5a4e36" stroke-width="0.4" opacity="0.6">
      <line x1="72" y1="68" x2="72" y2="80"/>
      <line x1="86" y1="68" x2="86" y2="80"/>
      <line x1="100" y1="68" x2="100" y2="80"/>
      <line x1="114" y1="68" x2="114" y2="80"/>
      <line x1="128" y1="68" x2="128" y2="80"/>
    </g>
  </g>
</svg>
