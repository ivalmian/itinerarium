<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
    <linearGradient id="lg-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cabe96"/>
      <stop offset="1" stop-color="#7a6a48"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="0.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#hex)" filter="url(#ds)">
    <!-- straight road from (64,74) to (128,74) -->
    <rect x="64" y="68" width="64" height="12" fill="url(#lg-stone)"/>
    <!-- curbs (parallel rails) -->
    <line x1="64" y1="67" x2="128" y2="67" stroke="#3a342a" stroke-width="0.6"/>
    <line x1="64" y1="81" x2="128" y2="81" stroke="#3a342a" stroke-width="0.6"/>
    <!-- cobble blocks -->
    <g stroke="#5a4e36" stroke-width="0.4" opacity="0.7">
      <line x1="72" y1="68" x2="72" y2="80"/>
      <line x1="80" y1="68" x2="80" y2="80"/>
      <line x1="88" y1="68" x2="88" y2="80"/>
      <line x1="96" y1="68" x2="96" y2="80"/>
      <line x1="104" y1="68" x2="104" y2="80"/>
      <line x1="112" y1="68" x2="112" y2="80"/>
      <line x1="120" y1="68" x2="120" y2="80"/>
      <line x1="64" y1="74" x2="128" y2="74"/>
    </g>
  </g>
</svg>
