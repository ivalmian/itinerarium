    <line x1="70" y1="76" x2="36" y2="128" stroke="#3a342a" stroke-width="0.6"/>
    <line x1="60" y1="68" x2="26" y2="120" stroke="#3a342a" stroke-width="0.6"/>
    <g stroke="#5a4e36" stroke-width="0.4" opacity="0.7">
      <line x1="65" y1="72" x2="31" y2="124"/>
      <line x1="68" y1="80" x2="58" y2="74"/>
      <line x1="63" y1="88" x2="53" y2="82"/>
      <line x1="57" y1="98" x2="47" y2="92"/>
      <line x1="51" y1="108" x2="41" y2="102"/>
      <line x1="44" y1="118" x2="34" y2="112"/>
    </g>
  </g>
</svg>
