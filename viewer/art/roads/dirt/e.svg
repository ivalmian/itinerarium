<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
  </defs>
  <g clip-path="url(#hex)">
    <!-- Straight road from past-center (60,74) to past-edge (132,74). 4-px
         extension on each side ensures clean stroke overlap with the opposite
         segment at center AND avoids clip-path occlusion at the hex edge.
         No filter — browsers can mis-compute the filter region for
         degenerate-height (purely horizontal) bounding boxes. -->
    <line x1="60" y1="74" x2="132" y2="74" stroke="#7a5a30" stroke-width="5" stroke-linecap="round"/>
    <line x1="60" y1="74" x2="132" y2="74" stroke="#a07a3e" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
    <line x1="64" y1="74" x2="128" y2="74" stroke="#5a4022" stroke-width="0.5" opacity="0.55"/>
  </g>
</svg>
