<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="lg-armor" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#8a8a92"/>
      <stop offset="1" stop-color="#3a3a42"/>
    </linearGradient>
    <linearGradient id="lg-tunic" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#c84838"/>
      <stop offset="1" stop-color="#5a1408"/>
    </linearGradient>
    <linearGradient id="lg-shield" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#a83828"/>
      <stop offset="1" stop-color="#4a1208"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0.4" dy="0.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="16" cy="27" rx="14" ry="2" fill="#2a1e10" opacity="0.5"/>
  <g filter="url(#ds)">
    <!-- soldier 1 (front-left) -->
    <ellipse cx="8" cy="12" rx="1.6" ry="1.4" fill="#e8c894"/>
    <!-- helmet (galea) -->
    <path d="M 6 12 L 10 12 Q 10 9 8 8 Q 6 9 6 12 Z" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <!-- helmet crest -->
    <path d="M 7 8 L 9 8 L 9 7 L 7 7 Z" fill="#c84838"/>
    <!-- body / lorica -->
    <rect x="6" y="13" width="4" height="6" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="6" y1="15" x2="10" y2="15" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="6" y1="17" x2="10" y2="17" stroke="#1a1a1e" stroke-width="0.3"/>
    <!-- tunic skirt (pteruges) -->
    <path d="M 6 19 L 10 19 L 10 22 L 6 22 Z" fill="url(#lg-tunic)" stroke="#1a0e04" stroke-width="0.3"/>
    <!-- legs -->
    <line x1="7" y1="22" x2="7" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <line x1="9" y1="22" x2="9" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <!-- pilum (javelin) -->
    <line x1="11" y1="6" x2="11" y2="24" stroke="#6a4a26" stroke-width="0.5"/>
    <polygon points="11,6 10,8 12,8" fill="#a8a098" stroke="#3a342a" stroke-width="0.2"/>
    <!-- shield (scutum) -->
    <ellipse cx="5" cy="16" rx="1.6" ry="3" fill="url(#lg-shield)" stroke="#3a0e04" stroke-width="0.3"/>
    <circle cx="5" cy="16" r="0.5" fill="#daca7a"/>
    <!-- soldier 2 (rear-center) -->
    <ellipse cx="16" cy="12" rx="1.6" ry="1.4" fill="#e8c894"/>
    <path d="M 14 12 L 18 12 Q 18 9 16 8 Q 14 9 14 12 Z" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <path d="M 15 8 L 17 8 L 17 7 L 15 7 Z" fill="#c84838"/>
    <rect x="14" y="13" width="4" height="6" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="14" y1="15" x2="18" y2="15" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="14" y1="17" x2="18" y2="17" stroke="#1a1a1e" stroke-width="0.3"/>
    <path d="M 14 19 L 18 19 L 18 22 L 14 22 Z" fill="url(#lg-tunic)" stroke="#1a0e04" stroke-width="0.3"/>
    <line x1="15" y1="22" x2="15" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <line x1="17" y1="22" x2="17" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <line x1="19" y1="6" x2="19" y2="24" stroke="#6a4a26" stroke-width="0.5"/>
    <polygon points="19,6 18,8 20,8" fill="#a8a098" stroke="#3a342a" stroke-width="0.2"/>
    <ellipse cx="13" cy="16" rx="1.6" ry="3" fill="url(#lg-shield)" stroke="#3a0e04" stroke-width="0.3"/>
    <circle cx="13" cy="16" r="0.5" fill="#daca7a"/>
    <!-- soldier 3 (rear-right) -->
    <ellipse cx="24" cy="12" rx="1.6" ry="1.4" fill="#e8c894"/>
    <path d="M 22 12 L 26 12 Q 26 9 24 8 Q 22 9 22 12 Z" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <path d="M 23 8 L 25 8 L 25 7 L 23 7 Z" fill="#c84838"/>
    <rect x="22" y="13" width="4" height="6" fill="url(#lg-armor)" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="22" y1="15" x2="26" y2="15" stroke="#1a1a1e" stroke-width="0.3"/>
    <line x1="22" y1="17" x2="26" y2="17" stroke="#1a1a1e" stroke-width="0.3"/>
    <path d="M 22 19 L 26 19 L 26 22 L 22 22 Z" fill="url(#lg-tunic)" stroke="#1a0e04" stroke-width="0.3"/>
    <line x1="23" y1="22" x2="23" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <line x1="25" y1="22" x2="25" y2="26" stroke="#3a342a" stroke-width="1.2"/>
    <line x1="27" y1="6" x2="27" y2="24" stroke="#6a4a26" stroke-width="0.5"/>
    <polygon points="27,6 26,8 28,8" fill="#a8a098" stroke="#3a342a" stroke-width="0.2"/>
    <ellipse cx="21" cy="16" rx="1.6" ry="3" fill="url(#lg-shield)" stroke="#3a0e04" stroke-width="0.3"/>
    <circle cx="21" cy="16" r="0.5" fill="#daca7a"/>
  </g>
</svg>
