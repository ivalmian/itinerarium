<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="lg-rags" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#5a4030"/>
      <stop offset="1" stop-color="#1a0e08"/>
    </linearGradient>
    <linearGradient id="lg-rags2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#3e342a"/>
      <stop offset="1" stop-color="#0e0804"/>
    </linearGradient>
    <linearGradient id="lg-skin" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#caa078"/>
      <stop offset="1" stop-color="#7a4a26"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0.4" dy="0.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="16" cy="27" rx="14" ry="2" fill="#2a1e10" opacity="0.55"/>
  <g filter="url(#ds)">
    <!-- bandit 1 (front, axe) -->
    <ellipse cx="6" cy="12" rx="1.6" ry="1.4" fill="url(#lg-skin)"/>
    <!-- hood/cowl -->
    <path d="M 4 13 L 8 13 L 8 9 Q 6 8 4 9 Z" fill="url(#lg-rags)" stroke="#0a0604" stroke-width="0.3"/>
    <!-- body / ragged tunic -->
    <path d="M 4 13 L 8 13 L 9 22 L 3 22 Z" fill="url(#lg-rags)" stroke="#0a0604" stroke-width="0.3"/>
    <!-- ragged hem -->
    <path d="M 3 22 L 4 23 L 5 22 L 6 23 L 7 22 L 8 23 L 9 22" fill="none" stroke="#0a0604" stroke-width="0.3"/>
    <!-- legs -->
    <line x1="4" y1="23" x2="3" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <line x1="8" y1="23" x2="9" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <!-- axe raised -->
    <line x1="10" y1="6" x2="9" y2="14" stroke="#5a3a18" stroke-width="0.6"/>
    <polygon points="9,6 7,4 11,4 10,6" fill="#7a7268" stroke="#1a1a18" stroke-width="0.3"/>
    <!-- bandit 2 (middle, sword + shield) -->
    <ellipse cx="16" cy="12" rx="1.6" ry="1.4" fill="url(#lg-skin)"/>
    <path d="M 14 13 L 18 13 L 18 9 Q 16 8 14 9 Z" fill="url(#lg-rags2)" stroke="#0a0604" stroke-width="0.3"/>
    <path d="M 14 13 L 18 13 L 19 22 L 13 22 Z" fill="url(#lg-rags2)" stroke="#0a0604" stroke-width="0.3"/>
    <path d="M 13 22 L 14 23 L 15 22 L 16 23 L 17 22 L 18 23 L 19 22" fill="none" stroke="#0a0604" stroke-width="0.3"/>
    <line x1="14" y1="23" x2="13" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <line x1="18" y1="23" x2="19" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <!-- short sword -->
    <line x1="19" y1="14" x2="22" y2="20" stroke="#a8a098" stroke-width="0.8"/>
    <line x1="18" y1="14" x2="20" y2="13" stroke="#5a3a18" stroke-width="0.8"/>
    <!-- crude wood shield -->
    <ellipse cx="13" cy="16" rx="1.4" ry="2.4" fill="#6a4a26" stroke="#1a0e04" stroke-width="0.3"/>
    <line x1="13" y1="14" x2="13" y2="18" stroke="#3a2010" stroke-width="0.3"/>
    <!-- bandit 3 (rear, spear) -->
    <ellipse cx="25" cy="13" rx="1.6" ry="1.4" fill="url(#lg-skin)"/>
    <path d="M 23 14 L 27 14 L 27 10 Q 25 9 23 10 Z" fill="url(#lg-rags)" stroke="#0a0604" stroke-width="0.3"/>
    <path d="M 23 14 L 27 14 L 28 22 L 22 22 Z" fill="url(#lg-rags)" stroke="#0a0604" stroke-width="0.3"/>
    <path d="M 22 22 L 23 23 L 24 22 L 25 23 L 26 22 L 27 23 L 28 22" fill="none" stroke="#0a0604" stroke-width="0.3"/>
    <line x1="23" y1="23" x2="22" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <line x1="27" y1="23" x2="28" y2="26" stroke="#1a0e04" stroke-width="0.8"/>
    <!-- spear -->
    <line x1="29" y1="6" x2="28" y2="22" stroke="#5a3a18" stroke-width="0.5"/>
    <polygon points="29,6 28,8 30,8" fill="#a8a098" stroke="#1a1a18" stroke-width="0.2"/>
  </g>
</svg>
