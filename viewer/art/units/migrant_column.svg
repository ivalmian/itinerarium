<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="lg-cloak" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#7a6238"/>
      <stop offset="1" stop-color="#2e1f10"/>
    </linearGradient>
    <linearGradient id="lg-pack" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#caa874"/>
      <stop offset="1" stop-color="#5a3a18"/>
    </linearGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0.4" dy="0.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="16" cy="27" rx="14" ry="2" fill="#2a1e10" opacity="0.5"/>
  <g filter="url(#ds)">
    <!-- adult ahead, carrying pack -->
    <ellipse cx="6" cy="13" rx="1.6" ry="1.4" fill="#e8c894"/>
    <path d="M 4 14 L 8 14 L 9 24 L 3 24 Z" fill="url(#lg-cloak)" stroke="#1a0e04" stroke-width="0.3"/>
    <path d="M 3 15 L 9 15 L 11 22 L 7 22 Z" fill="url(#lg-pack)" stroke="#3a1808" stroke-width="0.3"/>
    <line x1="4" y1="24" x2="3" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
    <line x1="8" y1="24" x2="9" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
    <!-- staff -->
    <line x1="2" y1="12" x2="1.5" y2="26" stroke="#6a4a26" stroke-width="0.5"/>
    <!-- child trailing -->
    <ellipse cx="13" cy="17" rx="1.2" ry="1" fill="#e8c894"/>
    <path d="M 11.5 17.5 L 14.5 17.5 L 15 24 L 11 24 Z" fill="#3e2814" stroke="#1a0e04" stroke-width="0.3"/>
    <line x1="12" y1="24" x2="11.5" y2="27" stroke="#1a0e04" stroke-width="0.5"/>
    <line x1="14" y1="24" x2="14.5" y2="27" stroke="#1a0e04" stroke-width="0.5"/>
    <!-- woman with bundle on head -->
    <ellipse cx="20" cy="13" rx="1.6" ry="1.4" fill="#e8c894"/>
    <path d="M 18 14 L 22 14 L 23 24 L 17 24 Z" fill="#6a3a4a" stroke="#1a0e04" stroke-width="0.3"/>
    <!-- bundle on head -->
    <ellipse cx="20" cy="10" rx="2.2" ry="1" fill="url(#lg-pack)" stroke="#3a1808" stroke-width="0.3"/>
    <line x1="18" y1="24" x2="17" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
    <line x1="22" y1="24" x2="23" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
    <!-- adult at rear carrying child -->
    <ellipse cx="27" cy="13" rx="1.6" ry="1.4" fill="#e8c894"/>
    <path d="M 25 14 L 29 14 L 30 24 L 24 24 Z" fill="url(#lg-cloak)" stroke="#1a0e04" stroke-width="0.3"/>
    <!-- baby in arms -->
    <ellipse cx="28" cy="17" rx="1.2" ry="0.8" fill="#daca7a"/>
    <line x1="25" y1="24" x2="24" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
    <line x1="29" y1="24" x2="30" y2="27" stroke="#1a0e04" stroke-width="0.6"/>
  </g>
</svg>
