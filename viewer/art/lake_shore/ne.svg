<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 148" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath id="hex"><polygon points="64,0 128,37 128,111 64,148 0,111 0,37"/></clipPath>
    <!-- Inward fade for NE edge. Edge midpoint (96,18.5); inward normal (-0.5, +0.866).
         Gradient runs from edge midpoint (opaque) → 30 px inward (transparent). -->
    <linearGradient id="lg-sand" gradientUnits="userSpaceOnUse"
                    x1="96" y1="18.5" x2="81" y2="44.5">
      <stop offset="0" stop-color="#e8d6a2"/>
      <stop offset="0.5" stop-color="#bca072" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#bca072" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#hex)">
    <!-- Strip along NE hex edge (64,0)→(128,37), pulled 30 px inward toward center. -->
    <polygon points="64,0 128,37 113,63 49,26" fill="url(#lg-sand)"/>
    <!-- Foam line at water-edge -->
    <path d="M 49 26 L 113 63" fill="none" stroke="#f4ecd6" stroke-width="0.6" opacity="0.65"/>
    <!-- Pebbles -->
    <g fill="#7a6238" opacity="0.7">
      <circle cx="74" cy="14" r="0.8"/>
      <circle cx="92" cy="24" r="0.8"/>
      <circle cx="108" cy="36" r="0.8"/>
    </g>
  </g>
</svg>
