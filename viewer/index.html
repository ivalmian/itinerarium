<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecogame — burn-in viewer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #14110e;
        --panel: #1f1b15;
        --panel-2: #2a241c;
        --border: #3d3528;
        --text: #e9e2d2;
        --muted: #9b8f77;
        --accent: #d2a44b;
        --accent-bright: #f0c66c;
        --bad: #c75451;
        --good: #6fae5c;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'Iowan Old Style', 'Palatino', 'Georgia', serif;
        font-size: 13px;
        overflow: hidden;
      }
      #app {
        display: grid;
        grid-template-columns: 1fr 340px;
        height: 100vh;
        width: 100vw;
      }
      #map-container {
        position: relative;
        background: #0e0c09;
        overflow: hidden;
      }
      #map-container canvas {
        display: block;
      }
      #overlay-controls {
        position: absolute;
        top: 8px;
        left: 8px;
        background: rgba(20, 17, 14, 0.85);
        border: 1px solid var(--border);
        padding: 6px 8px;
        border-radius: 4px;
        z-index: 5;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #overlay-controls label {
        color: var(--muted);
        font-size: 11px;
      }
      #overlay-controls select {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 2px 4px;
        font-family: inherit;
        font-size: 12px;
      }
      #help-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      #help-overlay.visible {
        display: flex;
      }
      #help-overlay .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 16px 24px;
        max-width: 400px;
      }
      #help-overlay h2 {
        margin: 0 0 12px 0;
        color: var(--accent-bright);
        font-size: 16px;
      }
      #help-overlay dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 16px;
        margin: 0;
      }
      #help-overlay dt {
        color: var(--accent);
        font-family: ui-monospace, monospace;
      }
      #sidebar {
        background: var(--panel);
        border-left: 1px solid var(--border);
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .section {
        background: var(--panel-2);
        border: 1px solid var(--border);
        padding: 8px 10px;
      }
      .section h3 {
        margin: 0 0 6px 0;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
      }
      .stat-row {
        display: flex;
        justify-content: space-between;
        font-variant-numeric: tabular-nums;
        padding: 1px 0;
      }
      .stat-row .label {
        color: var(--muted);
      }
      .stat-row .value {
        color: var(--text);
      }
      .time-controls button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 10px;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
        margin-right: 4px;
      }
      .time-controls button:hover {
        background: var(--panel-2);
        border-color: var(--accent);
      }
      .time-controls button.active {
        background: var(--accent);
        color: var(--bg);
      }
      .speed-display {
        display: inline-block;
        margin-left: 8px;
        color: var(--accent-bright);
        font-variant-numeric: tabular-nums;
      }
      table.resource-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }
      table.resource-table th {
        text-align: left;
        color: var(--muted);
        font-weight: normal;
        padding: 2px 4px;
        border-bottom: 1px solid var(--border);
      }
      table.resource-table td {
        padding: 1px 4px;
        font-variant-numeric: tabular-nums;
      }
      table.resource-table td.num {
        text-align: right;
      }
      .selected-empty {
        color: var(--muted);
        font-style: italic;
      }
      .resource-toggle {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 4px 10px;
        cursor: pointer;
        font-family: inherit;
        width: 100%;
        text-align: left;
      }
      .copy-btn {
        background: var(--panel);
        color: var(--muted);
        border: 1px solid var(--border);
        padding: 2px 6px;
        cursor: pointer;
        font-family: inherit;
        font-size: 10px;
        margin-top: 4px;
      }
      .copy-btn:hover {
        color: var(--accent-bright);
      }
      .event-log {
        max-height: 180px;
        overflow-y: auto;
        font-size: 11px;
        font-family: ui-monospace, 'SF Mono', monospace;
        line-height: 1.4;
      }
      .event-log .event {
        padding: 1px 0;
        color: var(--muted);
      }
      .event-log .event.high {
        color: var(--accent-bright);
      }
      .event-log .event.bad {
        color: var(--bad);
      }
      .event-log .event.good {
        color: var(--good);
      }
      h4.entity-name {
        margin: 0 0 4px 0;
        color: var(--accent-bright);
        font-size: 14px;
      }
      .stocklist {
        max-height: 140px;
        overflow-y: auto;
      }
      /* Faction-link: inline button that opens the faction screen. */
      .faction-link {
        background: transparent;
        color: var(--accent-bright);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 6px;
        margin: 1px 3px 1px 0;
        font-family: inherit;
        font-size: 11px;
        cursor: pointer;
        text-decoration: none;
      }
      .faction-link:hover {
        background: var(--panel);
        border-color: var(--accent);
        color: var(--accent-bright);
      }
      /* Faction screen — modal popup. */
      .faction-screen-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .faction-screen-panel {
        background: #1a1611;
        color: #d8c8a4;
        border: 1px solid var(--border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        width: min(720px, 90vw);
        max-height: 86vh;
        overflow-y: auto;
        padding: 16px 22px 14px 22px;
        font-family: 'Iowan Old Style', 'Palatino', 'Georgia', serif;
      }
      .faction-screen-header {
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
      }
      .faction-screen-title-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }
      .faction-screen-title {
        margin: 0;
        font-size: 22px;
        color: var(--accent-bright);
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .faction-screen-close {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 3px;
        font-size: 18px;
        line-height: 1;
        padding: 2px 8px;
        cursor: pointer;
        font-family: inherit;
      }
      .faction-screen-close:hover {
        color: var(--accent-bright);
        border-color: var(--accent);
      }
      .faction-screen-subtitle {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }
      .faction-screen-muted {
        color: var(--muted);
        font-size: 11px;
        font-style: italic;
      }
      .faction-screen-section {
        margin-top: 14px;
      }
      .faction-screen-section-title {
        margin: 0 0 6px 0;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 600;
      }
      .faction-screen-subhead {
        color: var(--muted);
        font-size: 11px;
        margin-top: 8px;
        margin-bottom: 2px;
        letter-spacing: 0.04em;
      }
      .faction-screen-leadership {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .faction-screen-member {
        font-size: 12px;
        padding: 2px 0;
      }
      .faction-screen-member-name {
        color: var(--text);
      }
      .faction-screen-member-leader {
        color: var(--accent-bright);
        font-weight: 600;
      }
      .faction-screen-member-meta {
        color: var(--muted);
        font-size: 11px;
      }
      .faction-screen-stocklist {
        max-height: 160px;
        overflow-y: auto;
        font-size: 12px;
      }
      .faction-screen-chiplist {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .faction-screen-chip {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 2px 8px;
        font-size: 11px;
        font-family: inherit;
        cursor: pointer;
      }
      .faction-screen-chip:hover {
        border-color: var(--accent);
        color: var(--accent-bright);
      }
      .faction-screen-caravans {
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-height: 150px;
        overflow-y: auto;
      }
      .faction-screen-caravan-row {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 3px 8px;
        font-size: 11px;
        font-family: ui-monospace, 'SF Mono', monospace;
        cursor: pointer;
        text-align: left;
      }
      .faction-screen-caravan-row:hover {
        border-color: var(--accent);
        color: var(--accent-bright);
      }
      .faction-screen-inline-link {
        background: transparent;
        color: var(--accent-bright);
        border: none;
        padding: 0;
        font-family: inherit;
        font-size: inherit;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .faction-screen-inline-link:hover {
        color: var(--accent);
      }
      .faction-screen-rep-head {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr;
        gap: 8px;
        padding: 4px 0;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .faction-screen-rep-row {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr;
        gap: 8px;
        align-items: center;
        padding: 3px 0;
        font-size: 12px;
      }
      .faction-screen-rep-col-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .faction-screen-rep-col-bar {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .faction-screen-rep-bar-track {
        position: relative;
        flex: 1;
        height: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .faction-screen-rep-bar-track::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1px;
        background: var(--border);
      }
      .faction-screen-rep-bar-fill {
        position: absolute;
        top: 0;
        bottom: 0;
        background: var(--good);
      }
      .faction-screen-rep-bar-num {
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        min-width: 32px;
        text-align: right;
      }
      .faction-screen-rep-meta {
        margin-top: 6px;
      }
      .faction-screen-footer {
        margin-top: 14px;
        border-top: 1px solid var(--border);
        padding-top: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      /* --- Session-configuration splash screen -------------------------- */
      #splash {
        position: fixed;
        inset: 0;
        background: #0e0c09;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 24px;
        overflow: auto;
      }
      #splash .splash-card {
        background: var(--panel);
        border: 1px solid var(--border);
        padding: 24px 28px;
        min-width: 360px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      }
      #splash h1 {
        margin: 0 0 4px 0;
        color: var(--accent-bright);
        font-size: 20px;
        letter-spacing: 0.04em;
      }
      #splash .splash-subtitle {
        margin: 0 0 16px 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      #splash .splash-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 14px;
      }
      #splash .splash-field {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      #splash .splash-field-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      #splash .splash-form input {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 5px 8px;
        font-family: inherit;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }
      #splash .splash-form input:focus {
        outline: none;
        border-color: var(--accent);
      }
      #splash .splash-error {
        margin-top: 12px;
        padding: 6px 10px;
        background: rgba(199, 84, 81, 0.12);
        border: 1px solid var(--bad);
        color: var(--bad);
        font-size: 12px;
      }
      #splash .splash-actions {
        margin-top: 18px;
        display: flex;
        justify-content: flex-end;
      }
      #splash .splash-start {
        background: var(--accent);
        color: var(--bg);
        border: 1px solid var(--accent);
        padding: 8px 22px;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
      }
      #splash .splash-start:hover {
        background: var(--accent-bright);
        border-color: var(--accent-bright);
      }
      #splash .splash-start:disabled {
        opacity: 0.5;
        cursor: progress;
      }
      #splash .splash-progress {
        margin-top: 12px;
      }
      #splash .splash-progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        font-variant-numeric: tabular-nums;
      }
      #splash .splash-progress-bar {
        width: 100%;
        height: 8px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      #splash .splash-progress-bar-inner {
        height: 100%;
        background: var(--accent);
        width: 0%;
        transition: width 80ms linear;
      }

  <body>
    <div id="app">
      <div id="map-container">
        <div id="overlay-controls">
